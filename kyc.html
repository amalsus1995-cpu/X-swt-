<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>التحقق من الهوية - 1X.swt</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

    <header class="top-header">
      <div class="logo-box">
        <div class="logo-circle">ID</div>
        <div>
          <h1>1X.swt</h1>
          <p>التحقق من الهوية</p>
        </div>
      </div>

      <button class="lang-icon-btn" type="button">🌐</button>
    </header>

    <section class="hero-card">
      <div class="hero-text">
        <h2>توثيق الحساب</h2>
        <p>
          قم بإرسال بياناتك الأساسية وملفات الهوية حتى يتم توثيق حسابك داخل المنصة.
        </p>
      </div>
    </section>

    <section class="section-box">
      <div class="section-title">
        <h2>الحالة الحالية</h2>
      </div>

      <div id="kycStatusBox" class="deposits-list">
        <p class="note">جاري تحميل الحالة...</p>
      </div>
    </section>

    <section class="section-box">
      <div class="section-title">
        <h2>إرسال طلب جديد</h2>
      </div>

      <form id="kycForm" class="auth-form">
        <input
          type="text"
          id="kycFullName"
          class="form-input"
          placeholder="الاسم الكامل"
          required
        />

        <input
          type="text"
          id="kycCountry"
          class="form-input"
          placeholder="الدولة"
          required
        />

        <input
          type="text"
          id="kycIdNumber"
          class="form-input"
          placeholder="رقم الهوية"
          required
        />

        <input
          type="text"
          id="frontImageUrl"
          class="form-input"
          placeholder="رابط صورة الهوية الأمامية"
          required
        />

        <input
          type="text"
          id="backImageUrl"
          class="form-input"
          placeholder="رابط صورة الهوية الخلفية"
          required
        />

        <input
          type="text"
          id="selfieImageUrl"
          class="form-input"
          placeholder="رابط صورة السيلفي"
          required
        />

        <button type="submit" class="primary-btn full-btn">
          إرسال الطلب
        </button>
      </form>

      <p id="kycMessage" class="note form-message"></p>
    </section>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <span>🏠</span>
        <small>الرئيسية</small>
      </a>

      <a href="codes.html" class="nav-item">
        <span>🎁</span>
        <small>الأكواد</small>
      </a>

      <a href="deposit.html" class="nav-item">
        <span>💳</span>
        <small>إيداع</small>
      </a>

      <a href="withdraw.html" class="nav-item">
        <span>💸</span>
        <small>سحب</small>
      </a>

      <a href="account.html" class="nav-item active">
        <span>👤</span>
        <small>الحساب</small>
      </a>
    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="kyc.js"></script>
</body>
</html>

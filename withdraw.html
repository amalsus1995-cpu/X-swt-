<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>السحب - 1X.swt</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

    <header class="top-header">
      <div class="logo-box">
        <div class="logo-circle">💸</div>
        <div>
          <h1>1X.swt</h1>
          <p>السحب</p>
        </div>
      </div>
      <button class="lang-icon-btn" type="button">🌐</button>
    </header>

    <section class="hero-card">
      <div class="hero-text">
        <h2>طلب سحب</h2>
        <p>واجهة عرض لطلب السحب ومراجعة البيانات قبل الإرسال.</p>
      </div>
    </section>

    <section class="stats-grid">
      <div class="stat-card">
        <span>الرصيد الحالي</span>
        <h3 id="balanceValue">0</h3>
        <small>دولار</small>
      </div>

      <div class="stat-card">
        <span>المتاح للسحب</span>
        <h3 id="availableWithdrawValue">0</h3>
        <small>دولار</small>
      </div>
    </section>

    <section class="section-box">
      <div class="section-title">
        <h2>بيانات السحب</h2>
      </div>

      <form class="auth-form" id="withdrawPreviewForm">
        <input
          type="number"
          id="withdrawAmount"
          class="form-input"
          placeholder="أدخل مبلغ السحب"
        />

        <input
          type="text"
          id="withdrawWallet"
          class="form-input"
          placeholder="عنوان المحفظة"
        />

        <input
          type="password"
          id="transactionPassword"
          class="form-input"
          placeholder="كلمة مرور المعاملة"
        />

        <button type="submit" class="primary-btn full-btn">
          معاينة الطلب
        </button>
      </form>

      <p id="withdrawMessage" class="note form-message"></p>
    </section>

    <section class="section-box">
      <div class="section-title">
        <h2>ملخص المعاينة</h2>
      </div>

      <div id="withdrawPreviewBox" class="deposits-list">
        <p class="note">لم يتم إدخال أي طلب بعد</p>
      </div>
    </section>

    <section class="section-box">
      <div class="section-title">
        <h2>ملاحظات</h2>
      </div>

      <div class="wallet-card">
        <p>هذه الصفحة مخصصة للعرض والمعاينة فقط.</p>
        <p class="note">الشبكة المعروضة: TRC20</p>
      </div>
    </section>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <span>🏠</span>
        <small>الرئيسية</small>
      </a>
      <a href="codes.html" class="nav-item">
        <span>🎁</span>
        <small>الأكواد</small>
      </a>
      <a href="deposit.html" class="nav-item">
        <span>💳</span>
        <small>إيداع</small>
      </a>
      <a href="withdraw.html" class="nav-item active">
        <span>💸</span>
        <small>سحب</small>
      </a>
      <a href="account.html" class="nav-item">
        <span>👤</span>
        <small>الحساب</small>
      </a>
    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="withdraw.js"></script>
</body>
</html>

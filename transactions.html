<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سجل العمليات - 1X.swt</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

    <header class="top-header">
      <div class="logo-box">
        <div class="logo-circle">📄</div>
        <div>
          <h1>1X.swt</h1>
          <p>سجل العمليات</p>
        </div>
      </div>
      <button class="lang-icon-btn" type="button">🌐</button>
    </header>

    <section class="hero-card">
      <div class="hero-text">
        <h2>جميع العمليات</h2>
        <p>تابع الإيداعات والسحوبات وسجل استخدام الأكواد داخل حسابك.</p>
      </div>
    </section>

    <section class="section-box">
      <div class="section-title">
        <h2>الإيداعات</h2>
      </div>

      <div id="depositsHistory" class="deposits-list">
        <p class="note">جاري تحميل الإيداعات...</p>
      </div>
    </section>

    <section class="section-box">
      <div class="section-title">
        <h2>السحوبات</h2>
      </div>

      <div id="withdrawalsHistory" class="deposits-list">
        <p class="note">جاري تحميل السحوبات...</p>
      </div>
    </section>

    <section class="section-box">
      <div class="section-title">
        <h2>الأكواد المستخدمة</h2>
      </div>

      <div id="codesHistory" class="deposits-list">
        <p class="note">جاري تحميل الأكواد...</p>
      </div>
    </section>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <span>🏠</span>
        <small>الرئيسية</small>
      </a>

      <a href="codes.html" class="nav-item">
        <span>🎁</span>
        <small>الأكواد</small>
      </a>

      <a href="deposit.html" class="nav-item">
        <span>💳</span>
        <small>إيداع</small>
      </a>

      <a href="withdraw.html" class="nav-item">
        <span>💸</span>
        <small>سحب</small>
      </a>

      <a href="account.html" class="nav-item active">
        <span>👤</span>
        <small>الحساب</small>
      </a>
    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="transactions.js"></script>
</body>
</html>

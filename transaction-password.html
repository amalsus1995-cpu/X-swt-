<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>كلمة مرور المعاملة - 1X.swt</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

    <header class="top-header">
      <div class="logo-box">
        <div class="logo-circle">🔒</div>
        <div>
          <h1>1X.swt</h1>
          <p>كلمة مرور المعاملة</p>
        </div>
      </div>

      <button class="lang-icon-btn" type="button">🌐</button>
    </header>

    <section class="hero-card">
      <div class="hero-text">
        <h2>تعيين أو تغيير كلمة المرور</h2>
        <p>
          استخدم هذه الصفحة لتحديث كلمة المرور الخاصة بالمعاملات داخل حسابك.
        </p>
      </div>
    </section>

    <section class="section-box">
      <div class="section-title">
        <h2>تحديث كلمة المرور</h2>
      </div>

      <form id="transactionPasswordForm" class="auth-form">
        <input
          type="password"
          id="oldPassword"
          class="form-input"
          placeholder="كلمة المرور الحالية"
        />

        <input
          type="password"
          id="newPassword"
          class="form-input"
          placeholder="كلمة المرور الجديدة"
          required
        />

        <input
          type="password"
          id="confirmPassword"
          class="form-input"
          placeholder="تأكيد كلمة المرور الجديدة"
          required
        />

        <button type="submit" class="primary-btn full-btn">
          حفظ التغيير
        </button>
      </form>

      <p id="transactionPasswordMessage" class="note form-message"></p>
    </section>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <span>🏠</span>
        <small>الرئيسية</small>
      </a>

      <a href="codes.html" class="nav-item">
        <span>🎁</span>
        <small>الأكواد</small>
      </a>

      <a href="deposit.html" class="nav-item">
        <span>💳</span>
        <small>إيداع</small>
      </a>

      <a href="withdraw.html" class="nav-item">
        <span>💸</span>
        <small>سحب</small>
      </a>

      <a href="account.html" class="nav-item active">
        <span>👤</span>
        <small>الحساب</small>
      </a>
    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="transaction-password.js"></script>
</body>
</html>
